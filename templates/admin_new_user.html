{% extends "base.html" %}
{% block title %}إضافة مستخدم جديد — حراج مونيتور{% endblock %}
{% block body %}
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-mark">🔍 حراج مونيتور</div></div>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item">📊 الرئيسية</a>
      <a href="/admin/users" class="nav-item active">👥 المستخدمون</a>
      <a href="/admin/logs" class="nav-item">📋 السجلات</a>
      <a href="/admin/settings" class="nav-item">⚙️ الإعدادات</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout" style="font-size:12px;color:var(--text3)">تسجيل الخروج</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">➕ إضافة مستخدم جديد</div>
      <div class="topbar-actions">
        <a href="/admin/users" class="btn btn-ghost btn-sm">← رجوع</a>
      </div>
    </div>
    <div class="page-body">
      <div class="card" style="max-width:600px;margin:0 auto">

        {% if error %}
        <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#fca5a5;font-size:14px">
          ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/admin/users/new">
          <div class="form-group">
            <label class="form-label">الاسم الكامل</label>
            <input type="text" name="name" class="form-control" placeholder="اسم المستخدم" required>
          </div>
          <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">رقم الجوال (واتساب)</label>
            <input type="text" name="phone" class="form-control" placeholder="966501234567" required>
          </div>
          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
          </div>
          <div class="form-group">
            <label class="form-label">مدة الاشتراك التجريبي (أيام)</label>
            <input type="number" name="days" class="form-control" value="7" min="1" max="365">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
            ➕ إضافة المستخدم
          </button>
        </form>
      </div>
    </div>
  </main>
</div>
{% endblock %}
