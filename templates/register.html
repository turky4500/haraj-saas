<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - راصد حراج</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 style="color: #2c3e50;">✨ إنشاء حساب جديد</h3>
            <p class="text-muted">انضم إلينا وابدأ رصد إعلاناتك</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" required placeholder="اختر اسم مستخدم">
            </div>
            <div class="mb-3">
                <label class="form-label">رقم الواتساب (للتفعيل)</label>
                <input type="text" name="phone" class="form-control" required placeholder="مثال: 9665xxxxxxxx">
            </div>
            <div class="mb-4">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control" required placeholder="اختر كلمة مرور قوية">
            </div>
            <button type="submit" class="btn btn-success w-100 mb-3">إرسال كود التحقق</button>
        </form>
        <div class="text-center">
            <span class="text-muted">لديك حساب بالفعل؟</span>
            <a href="/login" class="text-decoration-none">سجل دخولك</a>
        </div>
    </div>
</body>
</html>
