<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — حراج مونيتور</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--border:#1f2d45;--accent:#3b82f6;--accent2:#06b6d4;--success:#10b981;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;pointer-events:none}
.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px}
.logo{text-align:center;margin-bottom:28px}
.logo-mark{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.trial-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--success);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-top:10px}
h1{font-size:20px;font-weight:700;margin-bottom:6px}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:24px}
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-control{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:10px;font-size:14px;outline:none;transition:border .15s;font-family:inherit}
.form-control:focus{border-color:var(--accent);background:rgba(59,130,246,.05)}
.btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:8px}
.btn:hover{background:#2563eb;transform:translateY(-1px)}
.link-row{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.link-row a{color:var(--accent);font-weight:500}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo">
    <div class="logo-mark">🔍 حراج مونيتور</div>
    <div><span class="trial-badge">✅ يومان مجاناً عند التسجيل</span></div>
  </div>
  <h1>إنشاء حساب جديد</h1>
  <p class="subtitle">سجّل وابدأ مراقبة إعلانات حراج الآن</p>
  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}
  <form method="post" action="/register">
    <div class="form-group">
      <label class="form-label">الاسم</label>
      <input type="text" name="name" class="form-control" placeholder="اسمك الكامل" required>
    </div>
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">رقم الواتساب (مع رمز الدولة)</label>
      <input type="text" name="phone" class="form-control" placeholder="966501234567" required>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" name="password" class="form-control" placeholder="8 أحرف على الأقل" required minlength="6">
    </div>
    <button type="submit" class="btn">إنشاء الحساب والبدء مجاناً</button>
  </form>
  <div class="link-row">عندك حساب؟ <a href="/login">تسجيل الدخول</a></div>
</div>
</body>
</html>
