{% extends "base.html" %}
{% block title %}حساب جديد — راصد حراج{% endblock %}
{% block extra_css %}
<style>
    .auth-container { max-width: 450px; margin: 40px auto; background: var(--card-bg); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); }
    .auth-title { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 10px; color: var(--text-main); }
    .auth-sub { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 700; margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 15px; background: var(--bg); transition: 0.3s; }
    .form-control:focus { outline: none; border-color: var(--primary); background: #fff; }
    .btn-submit { width: 100%; padding: 14px; font-size: 16px; font-family: 'Tajawal', sans-serif; font-weight: bold;}
    .alert { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: 700; text-align: center; }
</style>
{% endblock %}
{% block body %}
<div class="auth-container">
    <h2 class="auth-title">إنشاء حساب جديد 🚀</h2>
    <p class="auth-sub">سجل مجاناً في "راصد حراج" واستمتع بالتجربة الفورية</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/register">
        <div class="form-group">
            <label class="form-label">الاسم الكريم</label>
            <input type="text" name="name" class="form-control" placeholder="مثال: أبو علي" required>
        </div>
        <div class="form-group">
            <label class="form-label">رقم الواتساب (بالصيغة الدولية)</label>
            <input type="text" name="phone" class="form-control" placeholder="مثال: 966500000000" required>
        </div>
        <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" name="email" class="form-control" placeholder="أدخل بريدك للتسجيل" required>
        </div>
        <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" name="password" class="form-control" placeholder="اختر كلمة مرور قوية" required>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">التسجيل وتفعيل الواتساب ←</button>
    </form>
    <div style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted);">
        لديك حساب بالفعل؟ <a href="/login" style="color: var(--primary); font-weight: 700; text-decoration: none;">سجل دخولك</a>
    </div>
</div>
{% endblock %}
