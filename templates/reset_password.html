<!DOCTYPE html>
<html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>تعيين كلمة مرور جديدة</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet"></head>
<body style="background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="card p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <h4 class="mb-3 text-center text-success">🔑 تعيين كلمة مرور جديدة</h4>
        {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
        <form method="POST">
            <div class="mb-3"><label>كود التحقق المرسل للواتساب</label><input type="text" name="otp" class="form-control text-center fs-4" required maxlength="4" style="letter-spacing: 10px;"></div>
            <div class="mb-4"><label>كلمة المرور الجديدة</label><input type="password" name="new_password" class="form-control" required></div>
            <button type="submit" class="btn btn-success w-100">حفظ الدخول</button>
        </form>
    </div>
</body></html>
