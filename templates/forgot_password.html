<!DOCTYPE html>
<html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>استعادة كلمة المرور</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet"></head>
<body style="background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="card p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <h4 class="mb-3 text-center text-danger">🔐 استعادة كلمة المرور</h4>
        {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
        <form method="POST">
            <div class="mb-4"><label>رقم جوالك المسجل بالواتساب</label><input type="text" name="phone" class="form-control" required placeholder="مثال: 9665xxxxxxxx"></div>
            <button type="submit" class="btn btn-danger w-100 mb-2">إرسال كود الاستعادة</button>
            <a href="/login" class="btn btn-light w-100">رجوع للدخول</a>
        </form>
    </div>
</body></html>
