{% extends "base.html" %}
{% block title %}تسجيل الدخول — راصد حراج{% endblock %}
{% block extra_css %}
<style>
    .auth-container { max-width: 400px; margin: 60px auto; background: var(--card-bg); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); }
    .auth-title { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 30px; color: var(--text-main); }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 15px; background: var(--bg); transition: 0.3s; }
    .form-control:focus { outline: none; border-color: var(--primary); background: #fff; }
    .btn-submit { width: 100%; padding: 14px; font-size: 16px; }
    .auth-links { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .auth-links a { color: var(--primary); font-weight: 700; text-decoration: none; }
    .alert { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: 700; text-align: center; }
</style>
{% endblock %}
{% block body %}
<div class="auth-container">
    <h2 class="auth-title">تسجيل الدخول 👋</h2>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
        <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" name="email" class="form-control" placeholder="أدخل بريدك" required>
        </div>
        <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" required>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">دخول</button>
    </form>
    <div class="auth-links">ليس لديك حساب؟ <a href="/register">سجل الآن مجاناً</a></div>
</div>
{% endblock %}
