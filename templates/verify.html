<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>التحقق من الرقم - راصد حراج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(180deg, #e6f7f4 0%, #f8f9fa 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; position: relative; overflow: hidden; }
        .form-control { border-radius: 12px; padding: 12px; background-color: #f8f9fa; border: 2px dashed #1abc9c; font-size: 2rem; letter-spacing: 15px; text-align: center; }
        .form-control:focus { box-shadow: none; border-color: #16a085; }
        .btn-success { background-color: #1abc9c; border: none; border-radius: 12px; padding: 12px; font-weight: 700; font-size: 1.1rem; }
        .btn-success:hover { background-color: #16a085; }
        
        #loader-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); z-index: 10;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .spinner { border: 4px solid rgba(26, 188, 156, 0.2); border-top: 4px solid #1abc9c; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-card">
        <div id="loader-overlay">
            <div class="spinner mb-3"></div>
            <h5 class="fw-bold" style="color: #1abc9c;">جاري تفعيل الحساب...</h5>
        </div>

        <div class="text-center mb-4">
            <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                <i class="fas fa-shield-alt fa-3x" style="color: #1abc9c;"></i>
            </div>
            <h3 class="fw-bold" style="color: #2c3e50;">رمز التحقق</h3>
            <p class="text-muted small">أدخل الرمز المكون من 4 أرقام المرسل للواتساب الخاص بك</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} rounded-3 small fw-bold">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/verify" id="verifyForm">
            <div class="mb-4">
                <input type="text" name="otp" class="form-control" required placeholder="XXXX" maxlength="4">
            </div>
            <button type="submit" class="btn btn-success w-100 mb-3 shadow-sm">تحقق وابدأ الرصد</button>
        </form>
        <div class="text-center">
            <a href="/register" class="text-decoration-none text-muted small"><i class="fas fa-arrow-right"></i> رجوع وتعديل الرقم</a>
        </div>
    </div>

    <script>
        document.getElementById('verifyForm').addEventListener('submit', function() {
            document.getElementById('loader-overlay').style.display = 'flex';
        });
    </script>
</body>
</html>
