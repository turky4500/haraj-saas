<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرقم - راصد حراج</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 style="color: #2c3e50;">🔐 رمز التحقق</h3>
            <p class="text-muted">أدخل الرمز المكون من 4 أرقام المرسل للواتساب الخاص بك</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/verify">
            <div class="mb-4">
                <input type="text" name="otp" class="form-control text-center fs-3" required placeholder="XXXX" maxlength="4" style="letter-spacing: 10px;">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">تحقق الآن</button>
        </form>
        <div class="text-center">
            <a href="/register" class="text-decoration-none text-muted">رجوع وتعديل الرقم</a>
        </div>
    </div>
</body>
</html>
