<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الواتساب - راصد حراج</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }
        .verify-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="verify-container text-center">
            <h3 class="mb-4">التحقق من الواتساب 💬</h3>
            <p class="text-muted">أرسلنا رمز تحقق مكون من 4 أرقام إلى رقم الواتساب الخاص بك.</p>
            
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            <form method="post" action="/verify">
                <div class="mb-3">
                    <input type="text" name="otp" class="form-control text-center" placeholder="أدخل الرمز هنا (مثال: 1234)" required autofocus autocomplete="off" style="font-size: 1.5rem; letter-spacing: 5px;">
                </div>
                <button type="submit" class="btn btn-primary w-100">تأكيد التسجيل</button>
            </form>
        </div>
    </div>
</body>
</html>
