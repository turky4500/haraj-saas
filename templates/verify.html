{% extends "base.html" %}
{% block title %}التحقق من الرقم — راصد حراج{% endblock %}
{% block extra_css %}
<style>
    .auth-container { max-width: 400px; margin: 80px auto; background: var(--card-bg); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
    .otp-icon { font-size: 50px; margin-bottom: 20px; }
    .form-control { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Tajawal', sans-serif; font-size: 24px; text-align: center; letter-spacing: 10px; font-weight: 800; background: var(--bg); transition: 0.3s; margin-bottom: 20px; }
    .form-control:focus { outline: none; border-color: var(--primary); background: #fff; }
    .btn-submit { width: 100%; padding: 14px; font-size: 16px; }
</style>
{% endblock %}
{% block body %}
<div class="auth-container">
    <div class="otp-icon">💬</div>
    <h2 style="font-weight: 800; margin-bottom: 10px;">تحقق من الواتساب</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">أرسلنا رمز تحقق مكون من 4 أرقام إلى رقمك، يرجى إدخاله هنا لتفعيل اشتراكك.</p>
    
    {% if error %}<div style="background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: 700;">{{ error }}</div>{% endif %}
    
    <form method="post" action="/verify">
        <input type="text" name="otp" class="form-control" placeholder="----" required autocomplete="off" autofocus>
        <button type="submit" class="btn btn-primary btn-submit">تأكيد وتفعيل الحساب</button>
    </form>
</div>
{% endblock %}
